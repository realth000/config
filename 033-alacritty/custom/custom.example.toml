# An example config to define custom values on each machine.
#
# Copy the content into `custom.toml` in this `custom` directory and all these
# configs will be imported in `../alacritty.toml`.
#
# The `custom.toml` is ignored in git repo so that we can have different configs
# on each machine.
[general]
import = ["../themes/catppuccin-mocha.toml"]

[env]
# Workaround to fix the keyboard freeze when exit vi mode.
#
# ref: https://github.com/alacritty/alacritty/issues/8907
#
# But this seems NOT work in the config file. set the env in desktop file.
XMODIFIERS = ""

[font]
size = 16.0

[font.normal]
family = "Iosevka1204 Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Iosevka1204 Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Iosevka1204 Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "Iosevka1204 Nerd Font Mono"
style = "Bold Italic"

