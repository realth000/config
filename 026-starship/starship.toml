"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$os\
$shell\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$time\
$status\
$cmd_duration\
\n$character"""

palette = "catppuccin_mocha"

[palettes.custom_dark]
background = "#343434"
blue = "#3a86ff"

[palettes.custom_light]
background = "#acb0be"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
background= "#313244"

[palettes.catppuccin_latte]
rosewater = "#dc8a78"
flamingo = "#dd7878"
pink = "#ea76cb"
mauve = "#8839ef"
red = "#d20f39"
maroon = "#e64553"
peach = "#fe640b"
yellow = "#df8e1d"
green = "#40a02b"
teal = "#179299"
sky = "#04a5e5"
sapphire = "#209fb5"
blue = "#1e66f5"
lavender = "#7287fd"
text = "#4c4f69"
subtext1 = "#5c5f77"
subtext0 = "#6c6f85"
overlay2 = "#7c7f93"
overlay1 = "#8c8fa1"
overlay0 = "#9ca0b0"
surface2 = "#acb0be"
surface1 = "#bcc0cc"
surface0 = "#ccd0da"
base = "#eff1f5"
mantle = "#e6e9ef"
crust = "#dce0e8"
background= "#ccd0da"

[os]
format = "[  ](bg:background fg:cyan)"
disabled = false

[hostname]
ssh_only = true
ssh_symbol = "󱘖 "
disabled = false

# Symbols from https://github.com/JanDeDobbeleer/oh-my-posh/blob/669521c8f7a30c107cce506ab64894abd3be00bc/src/segments/os.go#L30C31-L30C31
[os.symbols]
#alma = "\uF31D"
#almalinux9 = "\uF31D"
Alpine = "\uF300"
#aosc = "\uF301"
Arch = "\uF303"
CentOS = "\uF304"
#coreos = "\uF305"
Debian = "\uF306"
#devuan = "\uF307"
#raspbian = "\uF315"
#elementary = "\uF309"
Fedora = "\uF30a"
Gentoo = "\uF30d"
#mageia = "\uF310"
Manjaro = "\uF312"
Mint = "\uF30e"
NixOS = "\uF313"
openSUSE = "\uF314"
#opensuse-tumbleweed = "\uF314"
Redhat = "\uF316"
#rocky = "\uF32B"
#sabayon = "\uF317"
#slackware = "\uF319"
Ubuntu = "\uF31b"
Android = "\uf17b"
Windows = "\uE62a"
#darwin = "\uF179"
Macos = "\uF179"
Linux = "\uF17c"

[directory]
format = "[  $path ](bg:background fg:green)(bg:background fg:background)"

[git_branch]
symbol = ""
format = '[ $symbol $branch](bg:background fg:blue)'

[git_commit]
only_detached = false
commit_hash_length = 7
format = "[ 󰜘 $hash ](bg:background fg:blue)"

[git_state]
format = '[ \($state($progress_current of $progress_total)\) ]($style)'

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕${count}"
up_to_date = ""
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "-${count}"
typechanged = ""
style = "red bold"
format = '[$all_status$ahead_behind](bg:background fg:red)'

[status]
style = 'bg:background fg:red'
symbol = '⨯ '
success_symbol = ''
not_executable_symbol = '⨯ '
not_found_symbol = '⨯ '
sigint_symbol = '⨯ '
signal_symbol = '⨯ '
format = '[ $symbol$int ]($style)'
map_symbol = true
disabled = false

[time]
disabled = false
format = "[  $time ](bg:background fg:yellow)"

[cmd_duration]
min_time = 1000
show_milliseconds = true
format = "[  $duration ](bg:background fg:purple)"

[character] # 此模块名称为 'character'
success_symbol = '[](bold #3a86ff)'
error_symbol = '[](bold #e01849)'

[package]
disabled = true

[shell]
zsh_indicator = '\[zsh\]'
nu_indicator = '\[nu\]'
style = 'cyan bold bg:background'
format = '[$indicator]($style)'
disabled = false
